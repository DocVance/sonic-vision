<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bat Vision</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      #fallback-ui {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.5);
        pointer-events: none;
        text-align: center;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="fallback-ui">Desktop Mode: WASD to move, Drag to look, Spacebar to Ping</div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
